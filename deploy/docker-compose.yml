# Job pipeline stack (PROPOSALS.md §4). Phase 1 skeleton: db + review stub.
# Web exposure is exclusively via nginx proxy manager on the external
# `nginx` network — NO service publishes host ports.
#
# Usage (from deploy/):  docker compose up -d
# Secrets/interpolation come from deploy/.env (gitignored).
name: job-pipeline

networks:
  internal: {}
  nginx:
    external: true

volumes:
  dbdata: {}

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: jobs-db
    restart: unless-stopped
    networks: [internal]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

  # Long-running cron daemon (supercronic, nightly --all). Manual run:
  #   docker compose run --rm discovery uv run --no-sync python -m discovery.main --boards
  discovery:
    build: ../services/discovery
    container_name: jobs-discovery
    restart: unless-stopped
    init: true   # supercronic's reaper fatals as PID 1; let tini own PID 1
    networks: [internal]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      TZ: Asia/Taipei
    depends_on:
      db:
        condition: service_healthy

  pipeline:
    build: ../services/pipeline
    container_name: jobs-pipeline
    restart: unless-stopped
    networks: [internal]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      REVIEW_BASE_URL: https://jobs.churong.cc
      DATA_DIR: /data            # master bank + schemas (renderer pkg)
      RESUME_SEED: /seed/resume.json
    volumes:
      - ../packages/renderer/src/data:/data:ro
      - ../data:/seed:ro         # canonical résumé seed (fallback; DB is live source)
    depends_on:
      db:
        condition: service_healthy

  # Review API + UI (serves /api/*, the review SPA, and the resume renderer
  # at /resume/). Serves PII — live behind the NPM access list at
  # jobs.churong.cc (proxy host → jobs-api:8080 with HTTP-basic auth).
  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: jobs-api
    restart: unless-stopped
    # On the nginx network so NPM reaches it as jobs-api:8080. PII — only
    # ever expose via an ACCESS-LISTED proxy host (never without auth).
    networks: [internal, nginx]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DATA_DIR: /data            # overlay.schema.json (renderer pkg)
      RESUME_SEED: /seed/resume.json
    volumes:
      - ../packages/renderer/src/data:/data:ro
      - ../data:/seed:ro         # canonical résumé seed (validation fallback)
    depends_on:
      db:
        condition: service_healthy
