# Job pipeline stack (PROPOSALS.md §4). Phase 1 skeleton: db + review stub.
# Web exposure is exclusively via nginx proxy manager on the external
# `nginx` network — NO service publishes host ports.
#
# Usage (from deploy/):  docker compose up -d
# Secrets/interpolation come from deploy/.env (gitignored).
name: job-pipeline

networks:
  internal: {}
  nginx:
    external: true

volumes:
  dbdata: {}

services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    networks: [internal]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

  # Phase 1 stub: serves the built resume site (incl. /applications/*
  # overlays baked into the build). Replaced by the review app in Phase 3.
  review:
    image: nginx:alpine
    container_name: review
    restart: unless-stopped
    networks: [internal, nginx]
    volumes:
      - ../apps/site/build:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://localhost:8080/']
      interval: 15s
      timeout: 5s
      retries: 3
