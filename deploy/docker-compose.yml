# Job pipeline stack (PROPOSALS.md §4). Phase 1 skeleton: db + review stub.
# Web exposure is exclusively via nginx proxy manager on the external
# `nginx` network — NO service publishes host ports.
#
# Usage (from deploy/):  docker compose up -d
# Secrets/interpolation come from deploy/.env (gitignored).
name: job-pipeline

networks:
  internal: {}
  nginx:
    external: true

volumes:
  dbdata: {}

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: jobs-db
    restart: unless-stopped
    networks: [internal]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

  # Long-running cron daemon (supercronic, nightly --all). Manual run:
  #   docker compose run --rm discovery uv run --no-sync python -m discovery.main --boards
  discovery:
    build: ../services/discovery
    container_name: jobs-discovery
    restart: unless-stopped
    init: true   # supercronic's reaper fatals as PID 1; let tini own PID 1
    networks: [internal]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      TZ: Asia/Taipei
    depends_on:
      db:
        condition: service_healthy

  pipeline:
    build: ../services/pipeline
    container_name: jobs-pipeline
    restart: unless-stopped
    networks: [internal]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      REVIEW_BASE_URL: https://jobs.churong.cc
      DATA_DIR: /data
    volumes:
      - ../packages/renderer/src/data:/data:ro
    depends_on:
      db:
        condition: service_healthy

  # Review API + UI (serves /api/*, the review SPA, and the resume renderer
  # at /site/). Serves PII — INTERNAL ONLY until the NPM access list is on
  # (P3.7). At that point: add the `nginx` network here and point an
  # access-listed NPM proxy host at api:8080.
  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: jobs-api
    restart: unless-stopped
    # On the nginx network so NPM CAN reach it — but it is NOT exposed until
    # Tom points an ACCESS-LISTED proxy host (jobs.churong.cc) at
    # jobs-api:8080. Serves PII; never expose without the access list.
    networks: [internal, nginx]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy

  # Phase 1 stub: public resume at jobs.churong.cc (the renderer is also
  # served by `api` at /site/; this stub stays until P3.7 repoints NPM).
  review:
    image: nginx:alpine
    container_name: jobs-review
    restart: unless-stopped
    networks: [internal, nginx]
    volumes:
      - ../apps/site/build:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      # 127.0.0.1, not localhost: busybox wget prefers ::1 and nginx binds IPv4
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1:8080/healthz']
      interval: 15s
      timeout: 5s
      retries: 3
