# Review stub: static SPA serving on 8080 (proxied by nginx proxy manager
# as jobs.<domain> -> review:8080; no host ports published).
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # overlays and assets are real files; everything else falls back to the SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
